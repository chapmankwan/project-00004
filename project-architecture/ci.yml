name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  # ---------------------------------------------------------------------------
  # CI — runs on every push and PR
  # ---------------------------------------------------------------------------
  ci:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test --passWithNoTests

  # ---------------------------------------------------------------------------
  # DB migration — runs only on push to main (after CI passes)
  # ---------------------------------------------------------------------------
  migrate:
    name: Run database migrations
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: pnpm drizzle-kit migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ---------------------------------------------------------------------------
  # Deploy — Vercel handles this automatically via git integration.
  # This job just waits for the Vercel deployment to succeed and posts the URL.
  # Install the Vercel GitHub app to enable deployment comments on PRs.
  # ---------------------------------------------------------------------------
  deploy:
    name: Verify deployment
    runs-on: ubuntu-latest
    needs: [ci, migrate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Check Vercel deployment
        run: |
          echo "Vercel deploys automatically via the GitHub integration."
          echo "Check https://vercel.com/dashboard for deployment status."
          echo "Production URL: ${{ vars.PRODUCTION_URL }}"
